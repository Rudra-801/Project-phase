<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guidance | NEXZO</title>
<link rel="stylesheet" href="style.css?v=20260613-6">
<link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="career-body">

<nav class="navbar career-navbar">
<link rel="icon" type="image/png" href="favicon.png">
            <img
                src="favicon.png"
                alt="Logo"
                class="site-logo"
            >

            
            <h2 class="logo-text">Career Guidance</h2>
<a href="Home.html">🏠Home</a>
</nav>

<main class="career-page">
<header class="career-heading">
<p class="career-eyebrow">Explore engineering pathways</p>
<h1>Choose Your Engineering Branch</h1>
</header>

<section class="career-branch-stage" aria-label="Branch selection">
<div class="option-picker career-picker" id="branchPicker">
<input type="hidden" id="branch" value="" onchange="loadCareer()">
<button class="option-picker-trigger" type="button" onclick="toggleOptionPicker('branchPicker', event)">
<span>Select Branch</span><span class="option-picker-arrow"></span>
</button>
<div class="option-picker-menu">
<button type="button" onclick="chooseOption('branchPicker','branch','','Select Branch',event)">Select Branch</button>
<button type="button" onclick="chooseOption('branchPicker','branch','cse','Computer Science (CSE)',event)">Computer Science (CSE)</button>
<button type="button" onclick="chooseOption('branchPicker','branch','me','Mechanical Engineering (ME)',event)">Mechanical Engineering (ME)</button>
<button type="button" onclick="chooseOption('branchPicker','branch','ai','Artificial Intelligence (AI)',event)">Artificial Intelligence (AI)</button>
</div>
</div>

<div class="career-branch-meta" id="careerBranchMeta">
<span id="careerCount">0 roles</span>
<span id="careerBranchName">Select a branch to begin</span>
</div>
</section>

<section id="careerBox" class="career-grid" aria-live="polite">
<div class="career-empty-state">
<strong>Your career paths will appear here.</strong>
<span>Select a branch above to explore roles, skills and salary ranges.</span>
</div>
</section>
</main>

<div id="careerDetail" class="career-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="careerDialogTitle">
<div class="career-dialog-backdrop" onclick="closeCareer()"></div>
<div class="career-dialog-panel">
<button type="button" class="career-dialog-close" onclick="closeCareer()" aria-label="Close">&times;</button>
<div id="careerDialogContent"></div>
</div>
</div>

<script>
const careerData = {
    cse: {
        label: "Computer Science",
        roles: [
            { title: "Software Engineer", skills: "DSA, OOP, DBMS", salary: "6 - 20 LPA", mark: "SE" },
            { title: "Frontend Developer", skills: "HTML, CSS, JavaScript, React", salary: "5 - 15 LPA", mark: "FE" },
            { title: "Backend Developer", skills: "Node.js, MongoDB, APIs", salary: "6 - 18 LPA", mark: "BE" },
            { title: "Cyber Security Engineer", skills: "Networking, Linux, Security", salary: "8 - 22 LPA", mark: "CS" },
            { title: "Cloud Engineer", skills: "AWS, Azure, DevOps", salary: "10 - 25 LPA", mark: "CE" }
        ]
    },
    me: {
        label: "Mechanical Engineering",
        roles: [
            { title: "Automobile Engineer", skills: "CAD, Design, Engines", salary: "5 - 12 LPA", mark: "AE" },
            { title: "Robotics Engineer", skills: "Automation, Sensors", salary: "8 - 18 LPA", mark: "RE" },
            { title: "Production Engineer", skills: "Manufacturing, Production", salary: "4 - 10 LPA", mark: "PE" },
            { title: "Design Engineer", skills: "AutoCAD, SolidWorks", salary: "5 - 14 LPA", mark: "DE" }
        ]
    },
    ai: {
        label: "Artificial Intelligence",
        roles: [
            { title: "AI Engineer", skills: "Python, ML, Deep Learning", salary: "10 - 30 LPA", mark: "AI" },
            { title: "Machine Learning Engineer", skills: "TensorFlow, Neural Networks", salary: "12 - 35 LPA", mark: "ML" },
            { title: "NLP Engineer", skills: "LLMs, NLP, Transformers", salary: "15 - 40 LPA", mark: "NL" },
            { title: "Computer Vision Engineer", skills: "OpenCV, CNN", salary: "12 - 32 LPA", mark: "CV" },
            { title: "AI Researcher", skills: "Research, Models, Experiments", salary: "20 - 50 LPA", mark: "AR" }
        ]
    }
};

function loadCareer() {
    const branch = document.getElementById("branch").value;
    const box = document.getElementById("careerBox");
    const branchData = careerData[branch];

    if (!branchData) {
        document.getElementById("careerCount").textContent = "0 roles";
        document.getElementById("careerBranchName").textContent = "Select a branch to begin";
        box.innerHTML = `
            <div class="career-empty-state">
                <strong>Your career paths will appear here.</strong>
                <span>Select a branch above to explore roles, skills and salary ranges.</span>
            </div>
        `;
        return;
    }

    document.getElementById("careerCount").textContent = `${branchData.roles.length} roles`;
    document.getElementById("careerBranchName").textContent = branchData.label;
    box.innerHTML = branchData.roles.map((career, index) => `
        <button class="career-card" type="button" style="--career-delay:${index * 55}ms"
            onclick="showCareer('${branch}', ${index})">
            <span class="career-mark">${career.mark}</span>
            <span class="career-card-copy">
                <strong>${career.title}</strong>
                <span>${career.skills}</span>
            </span>
            <span class="career-salary">${career.salary}</span>
            <span class="career-card-action">View career path <b aria-hidden="true">&rarr;</b></span>
        </button>
    `).join("");
}

function showCareer(branch, index) {
    const career = careerData[branch]?.roles[index];
    if (!career) return;

    const encodedTitle = encodeURIComponent(career.title);
    document.getElementById("careerDialogContent").innerHTML = `
        <span class="career-dialog-mark">${career.mark}</span>
        <p class="career-dialog-label">Career profile</p>
        <h2 id="careerDialogTitle">${career.title}</h2>
        <div class="career-dialog-facts">
            <div><span>Core skills</span><strong>${career.skills}</strong></div>
            <div><span>Typical salary</span><strong>${career.salary}</strong></div>
        </div>
        <div class="career-resource-grid">
            <a href="https://roadmap.sh/" target="_blank" rel="noopener">Roadmap</a>
            <a href="https://www.youtube.com/results?search_query=${encodedTitle}+course" target="_blank" rel="noopener">Courses</a>
            <a href="https://www.google.com/search?q=${encodedTitle}+interview+questions" target="_blank" rel="noopener">Interviews</a>
            <a href="https://www.linkedin.com/jobs/search/?keywords=${encodedTitle}" target="_blank" rel="noopener">Jobs</a>
        </div>
    `;

    document.getElementById("careerDetail").classList.remove("hidden");
    document.body.classList.add("dialog-open");
}

function closeCareer() {
    document.getElementById("careerDetail").classList.add("hidden");
    document.body.classList.remove("dialog-open");
}

document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeCareer();
});
</script>
<script src="script.js?v=20260613-6"></script>
</body>
</html>

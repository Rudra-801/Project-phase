<!DOCTYPE html>
<html>

<head>

<title>Smart Planner | NEXZO</title>

<link rel="stylesheet" href="style.css?v=20260613-6">

<link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
<link rel="icon" type="image/png" href="favicon.png">
            <img
                src="favicon.png"
                alt="Logo"
                class="site-logo"
            >

            
            <h2 class="logo-text">Smart Planner</h2>


<div class="nav-right">
<a href="Home.html" class="nav-home">🏠Home</a>

</nav>

</nav>

<!-- SMART PLANNER -->

<div class="planner-container">

<!-- HEADING -->

<div class="planner-heading">



<p>
Track your real study progress & complete tasks before deadline 🚀
</p>

</div>

<!-- STATS -->

<div class="stats-grid">

<div class="stat-card">
<h2 id="totalTasks">1</h2>
<p>Total</p>
</div>

<div class="stat-card">
<h2 id="runningTasks">0</h2>
<p>Running</p>
</div>

<div class="stat-card">
<h2 id="completedTasks">1</h2>
<p>Completed</p>
</div>

<div class="stat-card">
<h2 id="blockedTasks">0</h2>
<p>Blocked</p>
</div>

</div>

<!-- MAIN GRID -->

<div class="planner-top-grid">

<!-- LEFT -->

<div class="planner-box">

<h2>
➕ Create New Task
</h2>

<!-- FORM -->

<div class="planner-form">

<input
type="text"
id="plannerTaskInput"
placeholder="Enter task">

<div class="option-picker planner-picker" id="plannerSuggestionPicker">
<input type="hidden" id="plannerSuggestion" value="Choose Suggested Task">
<button class="option-picker-trigger" type="button" onclick="toggleOptionPicker('plannerSuggestionPicker', event)">
<span>Choose Suggested Task</span><span class="option-picker-arrow"></span>
</button>
<div class="option-picker-menu">
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','Choose Suggested Task','Choose Suggested Task',event)">Choose Suggested Task</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','DSA Practice','DSA Practice',event)">DSA Practice</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','Frontend Development','Frontend Development',event)">Frontend Development</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','Backend Development','Backend Development',event)">Backend Development</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','React Revision','React Revision',event)">React Revision</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','DBMS Revision','DBMS Revision',event)">DBMS Revision</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','LeetCode Contest','LeetCode Contest',event)">LeetCode Contest</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','AI Model Training','AI Model Training',event)">AI Model Training</button>
<button type="button" onclick="chooseOption('plannerSuggestionPicker','plannerSuggestion','Machine Learning','Machine Learning',event)">Machine Learning</button>
</div>
</div>

<input
type="number"
id="plannerHours"
placeholder="Hours">

<div class="option-picker planner-picker" id="plannerDaysPicker">
<input type="hidden" id="plannerDays" value="1 Day">
<button class="option-picker-trigger" type="button" onclick="toggleOptionPicker('plannerDaysPicker', event)">
<span>1 Day</span><span class="option-picker-arrow"></span>
</button>
<div class="option-picker-menu">
<button class="is-selected" type="button" onclick="chooseOption('plannerDaysPicker','plannerDays','1 Day','1 Day',event)">1 Day</button>
<button type="button" onclick="chooseOption('plannerDaysPicker','plannerDays','2 Days','2 Days',event)">2 Days</button>
<button type="button" onclick="chooseOption('plannerDaysPicker','plannerDays','3 Days','3 Days',event)">3 Days</button>
<button type="button" onclick="chooseOption('plannerDaysPicker','plannerDays','5 Days','5 Days',event)">5 Days</button>
<button type="button" onclick="chooseOption('plannerDaysPicker','plannerDays','7 Days','7 Days',event)">7 Days</button>
</div>
</div>

<div class="option-picker planner-picker" id="plannerCategoryPicker">
<input type="hidden" id="plannerCategory" value="DSA">
<button class="option-picker-trigger" type="button" onclick="toggleOptionPicker('plannerCategoryPicker', event)">
<span>DSA</span><span class="option-picker-arrow"></span>
</button>
<div class="option-picker-menu">
<button class="is-selected" type="button" onclick="chooseOption('plannerCategoryPicker','plannerCategory','DSA','DSA',event)">DSA</button>
<button type="button" onclick="chooseOption('plannerCategoryPicker','plannerCategory','Development','Development',event)">Development</button>
<button type="button" onclick="chooseOption('plannerCategoryPicker','plannerCategory','Revision','Revision',event)">Revision</button>
<button type="button" onclick="chooseOption('plannerCategoryPicker','plannerCategory','Project','Project',event)">Project</button>
</div>
</div>

</div>

<!-- BUTTON -->

<button
class="add-task-btn"
onclick="addPlannerTask()">

Add Smart Task 🚀

</button>

<!-- TASK LIST -->

<div class="planner-task-list">

<div class="planner-task-card">
<p>Loading tasks...</p>
</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="side-section">

<!-- SUGGESTIONS -->

<div class="smart-suggestion-box">

<h3>
💡 Smart Suggestions
</h3>

<button class="suggestion-card" type="button"
onclick="applyPlannerTemplate('DSA Practice','DSA',2,'7 Days')">

<h4>
📘 DSA Roadmap
</h4>

<p>
✔ Arrays & Strings<br>
✔ Linked List<br>
✔ Trees & Graphs<br>
✔ Daily LeetCode Practice
</p>
<span class="suggestion-action">Use this plan &rarr;</span>
</button>

<button class="suggestion-card" type="button"
onclick="applyPlannerTemplate('Frontend Development','Development',3,'7 Days')">

<h4>
💻 Development Plan
</h4>

<p>
✔ HTML + CSS<br>
✔ JavaScript<br>
✔ ReactJS<br>
✔ Backend APIs
</p>
<span class="suggestion-action">Use this plan &rarr;</span>
</button>

<button class="suggestion-card" type="button"
onclick="applyPlannerTemplate('DBMS Revision','Revision',2,'5 Days')">

<h4>
📚 Revision Strategy
</h4>

<p>
✔ Revise OS Daily<br>
✔ Revise DBMS<br>
✔ Revise CN<br>
✔ Take Short Notes
</p>
<span class="suggestion-action">Use this plan &rarr;</span>
</button>

</div>

<!-- PRODUCTIVITY -->

<div class="productivity-box">

<h3>
🚀 Productivity Tips
</h3>

<ul>

<li><button type="button" class="productivity-tip" data-tip="hardest" onclick="toggleProductivityTip(this)">Complete hardest task first</button></li>
<li><button type="button" class="productivity-tip" data-tip="track" onclick="toggleProductivityTip(this)">Track progress daily</button></li>
<li><button type="button" class="productivity-tip" data-tip="consistent" onclick="toggleProductivityTip(this)">Stay consistent</button></li>
<li><button type="button" class="productivity-tip" data-tip="deadline" onclick="toggleProductivityTip(this)">Finish task before deadline</button></li>

</ul>

</div>

</div>

</div>

</div>

<script src="script.js?v=20260613-6"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Signup | Personalized Recommendation System
    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="favicon.png"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="style.css?v=20260613-8"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body class="auth-body">

    <div class="auth-container">

        <!-- TITLE -->

        <div class="logo">

            <h1>
                🚀 Create Account
            </h1>

            <p>
                Join Personalized Recommendation System
            </p>

        </div>

        <!-- NAME -->

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input
                type="text"
                id="name"
                placeholder="Enter your name"
            >

        </div>

        <!-- EMAIL -->

        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
            >

        </div>

        <!-- PASSWORD -->

        <div class="input-box password-box">

            <i class="fa-solid fa-lock"></i>

            <input
                type="password"
                id="password"
                placeholder="Create password"
            >

            <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('password', this)"
            >
                Show
            </button>

        </div>

        <!-- SIGNUP BUTTON -->

        <button
            class="auth-btn"
            onclick="createAccount()"
        >
            Create Account
        </button>

        <!-- LOGIN LINK -->

        <div class="bottom-link">

            Already have an account?

            <span
                onclick="goLogin()"
            >
                Login
            </span>

        </div>

    </div>

    <!-- SCRIPT -->

    <script src="script.js?v=20260613-8"></script>

</body>

</html>

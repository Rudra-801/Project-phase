<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Personalized Recommendation System</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#041250,#870e02);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.signup-container{
width:400px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:45px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
text-align:center;
animation:fadeIn 0.6s ease;
}

.signup-container h1{
margin-bottom:10px;
color:#11e8ff;
font-size:38px;
}

.signup-container p{
color:#d7f9ff;
margin-bottom:35px;
font-size:16px;
}

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.12);
color:white;
box-sizing:border-box;
}

.input-box input::placeholder{
color:#d0d0d0;
}

.signup-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ff7a18;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

.signup-btn:hover{
transform:scale(1.03);
background:#ff5e00;
}

.login-link{
margin-top:20px;
color:#d7f9ff;
font-size:15px;
}

.login-link span{
color:#11e8ff;
cursor:pointer;
font-weight:bold;
}

.login-link span:hover{
text-decoration:underline;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:500px){

.signup-container{
width:90%;
padding:30px;
}

.signup-container h1{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="signup-container">

<h1>
🎓 Create Account
</h1>

<p>
Join Personalized Recommendation System
</p>

<div class="input-box">
<input
type="text"
id="name"
placeholder="Enter your name">
</div>

<div class="input-box">
<input
type="email"
id="email"
placeholder="Enter your email">
</div>

<div class="input-box">
<input
type="password"
id="password"
placeholder="Create password">
</div>

<button
class="signup-btn"
onclick="createAccount()">

Create Account

</button>

<div class="login-link">

Already have an account?

<span onclick="goLogin()">
Login
</span>

</div>

</div>

<script>

function createAccount(){

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

if(name.trim() === ""){

alert("Enter name");
return;

}

if(email.trim() === "" || !email.includes("@")){

alert("Enter valid email");
return;

}

if(password.length < 4){

alert("Password must be at least 4 characters");
return;

}

// SAVE ACCOUNT

localStorage.setItem("userName",name);

localStorage.setItem("userEmail",email);

localStorage.setItem("userPassword",password);

alert("Account Created Successfully ✅");

// GO LOGIN

window.location.href = "login.html";

}

function goLogin(){

window.location.href = "login.html";

}

</script>

</body>
</html>

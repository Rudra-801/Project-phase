<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login | Personalized Recommendation System
    </title>

    <link
        rel="icon"
        type="image/png"
        href="favicon.png"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body class="login-body">

    <div class="login-container">

        <!-- LOGO -->

        <div class="login-logo">

            <img
                src="favicon.png"
                alt="Logo"
            >

        </div>

        <h1>
            Sign In
        </h1>

        <!-- EMAIL -->

        <div class="label">
            Email Address
        </div>

        <div class="login-input-box">

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
            >

        </div>

        <!-- PASSWORD -->

        <div class="label">
            Password
        </div>

        <div class="login-input-box password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter password"
            >

            <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('password', this)"
            >
                Show
            </button>

        </div>

        <!-- FORGOT PASSWORD -->

        <div class="forget-password">

            <a
                href="#"
                onclick="forgotPassword()"
            >
                Forgot Password?
            </a>

        </div>

        <!-- LOGIN BUTTON -->

        <button
            class="login-btn"
            onclick="loginUser()"
        >
            Sign In
        </button>

        <!-- DIVIDER -->

        <div class="divider">
            OR
        </div>

        <!-- GOOGLE LOGIN -->

        <div class="social-login">

            <button
                class="social-btn"
                onclick="googleLogin()"
            >

                <img
                    src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
                    alt="Google"
                >

                Continue With Google

            </button>

            <!-- GITHUB LOGIN -->

            <button
                class="social-btn"
                onclick="githubLogin()"
            >

                <img
                    src="https://cdn-icons-png.flaticon.com/512/25/25231.png"
                    alt="GitHub"
                >

                Continue With GitHub

            </button>

        </div>

        <!-- GUEST -->

        <button
            class="skip-btn"
            onclick="guestLogin()"
        >
            Continue as Guest
        </button>

        <!-- SIGNUP -->

        <div class="bottom-link">

            New User?

            <span
                onclick="goSignup()"
            >
                Create Account
            </span>

        </div>

    </div>

    <!-- SCRIPT -->

    <script src="script.js"></script>

    
</body>

</html>

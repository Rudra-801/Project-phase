<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login | Personalized Recommendation System
    </title>

    <link
        rel="icon"
        type="image/png"
        href="favicon.png"
    >

    <link
        rel="stylesheet"
        href="style.css?v=20260613-8"
    >

</head>

<body class="login-body">

    <header class="login-brand-strip">
        <div class="login-brand-inner">
            <img src="favicon.png" alt="NEXZO">
            <div>
                <strong>NEXZO</strong>
                <span>Personalized Recommendations for University Students</span>
            </div>
        </div>
    </header>

    <div class="login-container">

        <!-- LOGO -->

        <div class="login-logo">

            <img
                src="favicon.png"
                alt="Logo"
            >

        </div>

        <h1>
            Sign In
        </h1>

        <!-- EMAIL -->

        <div class="label">
            Email Address
        </div>

        <div class="login-input-box">

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
            >

        </div>

        <!-- PASSWORD -->

        <div class="label">
            Password
        </div>

        <div class="login-input-box password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter password"
            >

            <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('password', this)"
            >
                Show
            </button>

        </div>

        <div class="forget-password">
            <a href="#" onclick="forgotPassword(event)">Forgot Password?</a>
        </div>

        <!-- LOGIN BUTTON -->

        <button
            id="signInButton"
            class="login-btn"
            onclick="loginUser()"
        >
            Sign In
        </button>

        <p id="authMessage" class="auth-message" role="status"></p>

        <div class="divider">OR</div>

        <div class="social-login">
            <button
                type="button"
                class="social-btn"
                data-provider="google"
                onclick="googleLogin()"
            >
                <img
                    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                    alt=""
                >
                <span>Continue with Google</span>
            </button>

            <button
                type="button"
                class="social-btn"
                data-provider="github"
                onclick="githubLogin()"
            >
                <img
                    src="https://github.githubassets.com/favicons/favicon.svg"
                    alt=""
                >
                <span>Continue with GitHub</span>
            </button>
        </div>

        <!-- GUEST -->

        <button
            class="skip-btn"
            onclick="guestLogin()"
        >
            Continue as Guest
        </button>

        <!-- SIGNUP -->

        <div class="bottom-link">

            New User?

            <span
                onclick="goSignup()"
            >
                Create Account
            </span>

        </div>

    </div>

    <!-- SCRIPT -->

    <script src="script.js?v=20260613-8"></script>

    
</body>

</html>
